---
name: HomeKit Entity Architect
description: Installs the HomeKit Entity Architect integration into Home Assistant. Add virtual accessories (e.g. Smart Lock, Garage Door) from slot entities and optionally hide the raw entities on your HomeKit Bridge.
version: "1.2.7"
slug: homekit_architect
url: https://github.com/bramboe/homekit-groups
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
ingress: true
ingress_port: 8099
panel_title: HomeKit Architect
panel_icon: mdi:lock
map:
  - homeassistant_config:rw

# Add-on configuration (Settings → Apps → HomeKit Entity Architect → Configuration)
schema:
  reinstall_on_start: bool?
options:
  reinstall_on_start: true
