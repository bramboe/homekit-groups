---
name: HomeKit Entity Architect
description: Installs the HomeKit Entity Architect integration into Home Assistant. Add virtual accessories (e.g. Smart Lock, Garage Door) from slot entities and optionally hide the raw entities on your HomeKit Bridge. Use the "Open Web UI" button to open the configuration screen.
version: "1.1.9"
slug: homekit_architect
url: https://github.com/bramboe/homekit-groups
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
map:
  - homeassistant_config:rw
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Ingress redirect to configuration panel
ingress: true
panel_icon: mdi:apple-homekit
